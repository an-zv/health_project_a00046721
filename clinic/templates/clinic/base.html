<!DOCTYPE html>
<html>
<head>
    <title>Health Clinic Management System</title>
    <link href = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'clinic:home' %}">Health Clinic</a>
        <div>
        
            <a class="nav-link" href="{% url 'clinic:patient_list' %}">Patients</a>
            <a class="nav-link" href="{% url 'clinic:service_list' %}">Services</a>
            <a class="nav-link" href="{% url 'clinic:invoice_list' %}">Invoices</a>
            <a class="nav-link" href="/admin/">Admin</a>
        </div>
    </div>
</nav>
<div class="container">
    {% if user.is_authenticated %}
        <p>Logged in as {{ user.username }} | <a href="{% url 'logout' %}">Logout</a></p>
    {% else %}
        <p><a href="{% url 'login' %}">Login</a></p>
    {% endif %}
    {% block content %}
    {% endblock %}
</body>
</html>
